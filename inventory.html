<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LabFlow | Inventory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">
    <main class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Lab Inventory</h1>
            <button class="btn-add" onclick="window.location.href='/add-item-page'">
                + Add New Item
            </button>
        </header>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Item Name</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventory-list">
                <!-- Data will load here -->
            </tbody>
        </table>
    </main>
</div>

<script>

    // Load Inventory
    fetch('/api/inventory')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('inventory-list');

            list.innerHTML = data.map(item => `
                <tr>
                    <td>#${item.id}</td>
                    <td>${item.item_name}</td>
                    <td>${item.category}</td>
                    <td>
                        <span class="status-tag ${item.status.toLowerCase()}">
                            ${item.status}
                        </span>
                    </td>
                    <td>${item.quantity}</td>
                    <td>
                        ${item.status === 'Available' && item.quantity > 0 ? 
                        `<button onclick="requestItem(${item.id}, '${item.item_name}')">
                            Request
                        </button>` 
                        : 'N/A'}
                    </td>
                </tr>
            `).join('');
        });


    // Request Item Function
    function requestItem(itemId, itemName) {

        const userName = prompt("Enter your name:");
        if (!userName) return;

        const quantity = prompt("Enter quantity:");
        if (!quantity || quantity <= 0) {
            alert("Invalid quantity");
            return;
        }

        fetch('/request-item', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                user_name: userName,
                item_id: itemId,
                quantity: parseInt(quantity)
            })
        })
        .then(res => res.text())
        .then(message => {
            alert(message);
            location.reload();
        })
        .catch(error => {
            alert("Error submitting request");
            console.error(error);
        });
    }

</script>

</body>
</html>
