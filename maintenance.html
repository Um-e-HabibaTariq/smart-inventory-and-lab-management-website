<main class="main-content" style="padding: 40px; width: 100%; box-sizing: border-box; background-color: #0f172a; min-height: 100vh; color: white; font-family: 'Inter', sans-serif;">
    <style>
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #f8fafc;
        }

        /* Table Styling */
        #maintenanceTable {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #maintenanceTable th {
            text-align: left;
            padding: 16px;
            background-color: #334155;
            color: #38bdf8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #maintenanceTable td {
            padding: 16px;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
            font-size: 15px;
        }

        /* Status Tag */
        .status-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-tag.red {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Button Styling */
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }

        /* Empty State Styling */
        .empty-row {
            text-align: center;
            color: #94a3b8;
            padding: 40px !important;
            font-style: italic;
        }
    </style>

    <h1>Maintenance & Repairs</h1>
    <table id="maintenanceTable">
        <thead>
            <tr>
                <th>Item ID</th>
                <th>Item Name</th>
                <th>Category</th>
                <th>Condition</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="maintenance-list">
            </tbody>
    </table>
</main>

<script>
    fetch('/api/inventory')
        .then(res => res.json())
        .then(data => {
            const damaged = data.filter(item => item.status === 'Damaged');
            const list = document.getElementById('maintenance-list');
            
            if (damaged.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="empty-row">✅ All equipment is in good condition.</td></tr>`;
            } else {
                list.innerHTML = damaged.map(item => `
                    <tr>
                        <td>#${item.id}</td>
                        <td>${item.item_name}</td>
                        <td>${item.category}</td>
                        <td><span class="status-tag red">Needs Repair</span></td>
                        <td><button onclick="repairItem(${item.id})">Mark Repaired</button></td>
                    </tr>
                `).join('');
            }
        });

    function repairItem(id) {
        alert("Item ID #" + id + " sent to repair lab.");
        // Logic to update status back to 'Available' would go here
    }
</script>
